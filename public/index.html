<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sami Agency CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07090f;--bg2:#0d1117;--bg3:#111825;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--tx:#cdd5f0;--mu:#4a5680;--ac:#4f6ef7;--gr:#22c55e;--re:#ef4444;--am:#f59e0b}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.nav{position:fixed;left:0;top:0;bottom:0;width:210px;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;z-index:100}
.nav-logo{padding:18px 16px 14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.nav-logo h1{font-size:14px;font-weight:700;color:#fff}
.nav-logo p{font-size:10px;color:#6677aa;margin-top:2px}
.nav-links{flex:1;padding:8px 6px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:#c8d0e8;border:none;background:rgba(255,255,255,.04);width:100%;text-align:left;margin-bottom:3px;transition:all .15s}
.nb:hover{background:rgba(255,255,255,.1);color:#fff}
.nb.on{background:rgba(79,110,247,.25);color:#a5b4fc;border:1px solid rgba(79,110,247,.4);font-weight:600}
.nb .ic{width:22px;text-align:center;flex-shrink:0;font-size:16px}
.nav-ft{padding:12px;border-top:1px solid var(--b1);flex-shrink:0}
.nav-ft .sync{font-size:10px;color:#6677aa;text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sync-dot.warn{background:#f59e0b}
.sync-dot.err{background:#ef4444}
.sync-dot.spin{animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-ft-btns{display:flex;gap:6px}
.nav-ft-btns button,.nav-ft-btns label{flex:1;padding:7px 4px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:none;color:#c8d0e8;font-size:10px;cursor:pointer;text-align:center;font-family:inherit;display:block}
.nav-ft-btns button:hover,.nav-ft-btns label:hover{background:rgba(255,255,255,.1);color:#fff}
.main{margin-left:210px;padding:22px 24px;min-height:100vh}
.pg-title{font-size:19px;font-weight:700;color:#fff;margin-bottom:4px}
.pg-sub{font-size:12px;color:var(--mu);margin-bottom:18px}
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:13px;padding:16px;margin-bottom:12px}
.csm{background:var(--bg2);border:1px solid var(--b1);border-radius:9px;padding:12px;margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;padding:14px 16px}
.kv{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.kl{font-size:10px;color:var(--mu);margin-top:3px}
.kpi.alert{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.06)}
.kpi.warn{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.06)}
.kpi.good{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.06)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;padding:8px 10px;border-bottom:1px solid var(--b1);text-align:left;font-weight:600}
.tbl td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tbody tr:hover td{background:rgba(255,255,255,.02);cursor:pointer}
.ch{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;white-space:nowrap}
.sb{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:4px 10px;border-radius:20px;border:1px solid var(--b1);background:rgba(255,255,255,.03);color:#8899bb;font-size:10px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.pill:hover{border-color:var(--b2)}
.pill.on{background:rgba(79,110,247,.18);border-color:rgba(79,110,247,.5);color:#818cf8}
.inp{width:100%;padding:8px 11px;border-radius:8px;border:1px solid var(--b2);background:var(--bg3);color:var(--tx);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--ac)}
.sel{width:100%;padding:8px 11px;border-radius:8px;border:1px solid var(--b2);background:var(--bg3);color:var(--tx);font-family:inherit;font-size:13px;outline:none}
.lbl{display:block;font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.fg{display:flex;flex-direction:column;gap:12px}
.bp{padding:8px 14px;border-radius:8px;background:var(--ac);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.bp:hover{background:#3d5ce0}
.bd{padding:4px 9px;border-radius:7px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;font-family:inherit;font-size:11px;cursor:pointer}
.be{padding:4px 9px;border-radius:7px;background:rgba(79,110,247,.15);border:1px solid rgba(79,110,247,.3);color:#818cf8;font-family:inherit;font-size:11px;cursor:pointer}
.bs{padding:4px 9px;border-radius:7px;background:rgba(255,255,255,.07);border:1px solid var(--b2);color:#8899bb;font-family:inherit;font-size:11px;cursor:pointer}
.bwa{padding:5px 10px;border-radius:7px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac;font-family:inherit;font-size:11px;cursor:pointer;text-decoration:none;display:inline-block}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:22px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.side{position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--bg2);border-left:1px solid var(--b1);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}
.side.on{transform:none}
.side-hd{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.stabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0}
.stab{flex:1;padding:9px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--mu);font-family:inherit;font-size:11px;cursor:pointer}
.stab.on{border-bottom-color:var(--ac);color:#818cf8;font-weight:600}
.side-bd{flex:1;overflow-y:auto;padding:14px}
.row{display:flex;justify-content:space-between;align-items:center}
.ir{display:flex;justify-content:space-between;padding:6px 9px;background:rgba(255,255,255,.04);border-radius:7px;margin-bottom:4px;font-size:11px;color:var(--mu)}
.ir b{color:var(--tx);font-weight:500}
.alert-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:12px}
.warn-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:12px}
.toast{position:fixed;bottom:18px;right:18px;background:var(--gr);color:#fff;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none}
.toast.on{opacity:1;transform:none}
.toast.err{background:var(--re)}
.ftb{padding:7px 5px;border-radius:8px;border:1px solid var(--b2);background:rgba(255,255,255,.03);color:var(--mu);font-family:inherit;font-size:11px;cursor:pointer;text-align:center}
.ftb.on{background:rgba(79,110,247,.2);border-color:rgba(79,110,247,.5);color:#818cf8;font-weight:600}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px;color:var(--mu)}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){
  .nav{width:60px}
  .nav-logo h1,.nav-logo p,.nb-label,.nav-ft-label{display:none}
  .nb{justify-content:center;padding:10px;gap:0}
  .nb .ic{font-size:20px;width:28px}
  .main{margin-left:60px;padding:14px}
  .g4{grid-template-columns:1fr 1fr}
  .side{width:100%}
  .g2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><h1>Sami Agency</h1><p>Ecommerce CRM</p></div>
  <div class="nav-links">
    <button class="nb on" id="nb0" onclick="go(0)"><span class="ic">&#128202;</span><span class="nb-label">Dashboard</span></button>
    <button class="nb" id="nb1" onclick="go(1)"><span class="ic">&#128203;</span><span class="nb-label">CRM</span></button>
    <button class="nb" id="nb2" onclick="go(2)"><span class="ic">&#9989;</span><span class="nb-label">Live Accounts</span></button>
    <button class="nb" id="nb3" onclick="go(3)"><span class="ic">&#128176;</span><span class="nb-label">Finance</span></button>
    <button class="nb" id="nb4" onclick="go(4)"><span class="ic">&#9881;</span><span class="nb-label">Settings</span></button>
  </div>
  <div class="nav-ft">
    <div class="sync">
      <div class="sync-dot" id="sdot"></div>
      <span id="stxt">Connecting...</span>
    </div>
    <div class="nav-ft-btns">
      <button onclick="doBackup()" title="Download backup">&#128229; Backup</button>
      <label for="imp" title="Import data">&#128228; Import</label>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="doImport(this)">
    </div>
  </div>
</nav>

<div class="side" id="SIDE">
  <div class="side-hd">
    <div>
      <div style="font-weight:700;font-size:15px;color:#fff" id="S-nm"></div>
      <div style="font-size:11px;color:var(--mu);margin-top:2px" id="S-co"></div>
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <button class="be" onclick="oEdit(SID)" style="padding:5px 11px;font-size:11px">Edit</button>
      <button onclick="closeSide()" style="width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.08);border:none;color:#aaa;cursor:pointer;font-size:18px;line-height:1">&#10005;</button>
    </div>
  </div>
  <div class="stabs">
    <button class="stab on" onclick="setStab(0)">Info</button>
    <button class="stab" onclick="setStab(1)">Invoices</button>
    <button class="stab" onclick="setStab(2)">Tasks</button>
    <button class="stab" onclick="setStab(3)">Notes</button>
  </div>
  <div class="side-bd" id="S-bd"></div>
</div>

<div class="ov" id="OV" onclick="if(event.target===this)cMd()">
  <div class="modal">
    <div class="row" style="margin-bottom:16px">
      <div style="font-size:15px;font-weight:700;color:#fff" id="MT"></div>
      <button onclick="cMd()" style="width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.08);border:none;color:#aaa;cursor:pointer;font-size:20px;line-height:1">&#10005;</button>
    </div>
    <div class="fg" id="MB"></div>
  </div>
</div>

<div class="toast" id="TT"></div>
<main class="main" id="MAIN">
  <div class="loading"><div class="spinner"></div><div>Connecting to server...</div></div>
</main>

<script>
// ═══════════════════════ CONFIG ═══════════════════════
var API = window.location.origin;

// ═══════════════════════ STATE ═══════════════════════
var AA=[], TM=[], CS=[], PG=0, SID=null, STAB=0, FS=0, FV=0, SQ="", MM="", MI=null, CD=null, STS=0, FT=0;
var SAVING = false;

// ═══════════════════════ CONSTANTS ═══════════════════
var STATS = ["Lead","Proposal Sent","Proposal to Send","Follow Up","Account Creation","Ready to Start","Live & Selling","On Hold","Suspended"];
var PLATS = ["eBay UK","eBay USA","eBay AU","Amazon PL","Amazon WS","Amazon EU","Amazon AU","Amazon","Walmart","OnBuy","Etsy USA","Etsy","TikTok Shop","TikTok Shop UK","D8 Visa Portugal","Boot Camp","Amazon Training","Digital Marketing","Multiple","Other"];
var PCM = {"eBay UK":"#E53238","eBay USA":"#0064D2","eBay AU":"#C62828","Amazon PL":"#FF9900","Amazon WS":"#FF6600","Amazon EU":"#232F3E","Amazon AU":"#FF9900","Amazon":"#FF9900","Walmart":"#0071CE","OnBuy":"#E8430A","Etsy USA":"#F1641E","Etsy":"#F1641E","TikTok Shop":"#333","TikTok Shop UK":"#333","D8 Visa Portugal":"#006600","Boot Camp":"#6C63FF","Amazon Training":"#FF5722","Digital Marketing":"#9C27B0","Multiple":"#555","Other":"#666"};
var SBG = {"Lead":"#FEF9C3","Proposal Sent":"#DBEAFE","Proposal to Send":"#FEF3C7","Follow Up":"#CFFAFE","Account Creation":"#EDE9FE","Ready to Start":"#D1FAE5","Live & Selling":"#DCFCE7","On Hold":"#F3F4F6","Suspended":"#FEE2E2"};
var STX = {"Lead":"#854D0E","Proposal Sent":"#1E40AF","Proposal to Send":"#92400E","Follow Up":"#164E63","Account Creation":"#5B21B6","Ready to Start":"#065F46","Live & Selling":"#14532D","On Hold":"#374151","Suspended":"#7F1D1D"};
var VBG = ["#1e3a5f","#14532d","#4c1d95","#78350f","#164e63","#7f1d1d","#134e4a","#1a3520"];
var VTX = ["#60a5fa","#86efac","#c4b5fd","#fcd34d","#67e8f9","#fca5a5","#5eead4","#a3e635"];
var FTS  = ["Monthly","Profit %","Project"];

// ═══════════════════════ HELPERS ═════════════════════
function ge(id)  { return document.getElementById(id); }
function gv(id)  { var e=ge(id); return e?e.value:""; }
function esc(s)  { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function dol(n)  { return "$"+Number(n||0).toLocaleString(); }
function tday()  { return new Date().toISOString().split("T")[0]; }
function cmon()  { var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function mlab(s) { if(!s)return"-"; var p=s.split("-"),m=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return m[+p[1]]+" "+p[0]; }
function pclr(pl){ return PCM[pl]||"#555"; }
function fval(a) { var t=a.ft||"Monthly"; return t==="Monthly"?+a.mf||0:t==="Project"?+a.pt||0:0; }
function flbl(a) { var t=a.ft||"Monthly"; if(t==="Monthly")return dol(a.mf||0)+"/mo"; if(t==="Profit %")return(a.pp||0)+"%"; if(t==="Project")return dol(a.pt||0)+" proj"; return "-"; }
function fclr(a) { return a.ft==="Profit %"?"#8b5cf6":a.ft==="Project"?"#f59e0b":"#22c55e"; }
function sval(v) { if((v.st||"Fixed")==="Per Account"){var n=AA.filter(function(a){return a.va===v.name&&a.s==="Live & Selling";}).length;return(+v.pa||0)*n;} return +v.sal||0; }
function mxid(a) { return a.length?Math.max.apply(null,a.map(function(x){return +x.id||0;})):0; }
function blank() { return {id:0,cl:"",co:"",ph:"",cy:"",pl:"eBay UK",s:"Lead",va:"-",ft:"Monthly",mf:0,pp:0,pt:0,pu:0,pd:0,cs:"",ce:"",lc:"",fu:"",wa:"",em:"",no:"",ac:[],tk:[],iv:[]}; }
function daysUntil(ds) { if(!ds)return 999; return Math.ceil((new Date(ds)-new Date())/(1000*60*60*24)); }
function toast(m,e) { var t=ge("TT"); t.textContent=m; t.className="toast on"+(e?" err":""); setTimeout(function(){t.className="toast";},2400); }

// ═══════════════════════ SYNC STATUS ═════════════════
function setSyncStatus(state, msg) {
  var dot = ge("sdot"), txt = ge("stxt");
  if(!dot||!txt) return;
  dot.className = "sync-dot" + (state==="ok"?" ":state==="saving"?" warn spin":state==="err"?" err":" spin");
  txt.textContent = msg;
}

// ═══════════════════════ API CALLS ═══════════════════
async function loadFromServer() {
  setSyncStatus("loading", "Loading...");
  try {
    var r = await fetch(API + "/api/data");
    var data = await r.json();
    if(data.accs && data.accs.length) {
      AA = data.accs; TM = data.team||[]; CS = data.costs||[];
      setSyncStatus("ok", "Connected");
    } else {
      // First run - seed default data
      AA = SEED_DATA(); TM = DEFAULT_TEAM(); CS = DEFAULT_COSTS();
      await saveToServer();
      setSyncStatus("ok", "Ready");
    }
    if(!TM.length) TM = DEFAULT_TEAM();
    if(!CS.length) CS = DEFAULT_COSTS();
  } catch(e) {
    setSyncStatus("err", "Server offline");
    toast("Cannot connect to server. Is it running?", true);
  }
  ren();
}

async function saveToServer() {
  if(SAVING) return;
  SAVING = true;
  setSyncStatus("saving", "Saving...");
  try {
    var r = await fetch(API + "/api/data", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({accs:AA, team:TM, costs:CS})
    });
    var res = await r.json();
    if(res.ok) {
      setSyncStatus("ok", "Saved " + new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}));
    } else {
      setSyncStatus("err", "Save failed");
      toast("Save failed", true);
    }
  } catch(e) {
    setSyncStatus("err", "Save failed");
    toast("Could not save - check server", true);
  }
  SAVING = false;
}

async function sav() {
  await saveToServer();
}

// ═══════════════════════ BACKUP / IMPORT ═════════════
function doBackup() {
  window.location.href = API + "/api/backup";
  toast("Downloading backup...");
}
function doImport(input) {
  var file = input.files[0]; if(!file)return;
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var d = JSON.parse(e.target.result);
      if(d.accs&&d.accs.length){ AA=d.accs; TM=d.team||TM; CS=d.costs||CS; await saveToServer(); ren(); toast("Imported "+AA.length+" accounts!"); }
      else { toast("Invalid file",true); }
    } catch(err){ toast("Import failed",true); }
    input.value="";
  };
  reader.readAsText(file);
}

// ═══════════════════════ NAV ═════════════════════════
function go(p) {
  PG=p; CD=null; closeSide();
  for(var i=0;i<5;i++){var el=ge("nb"+i);if(el)el.className="nb"+(i===p?" on":"");}
  ren();
}
function ren() {
  if(PG===0)rDash();
  else if(PG===1)rCRM();
  else if(PG===2)rLive();
  else if(PG===3)rFin();
  else rSets();
  if(SID!=null)rSide();
}

// ═══════════════════════ MODAL ════════════════════════
function oMd(t,h,m,id) { MM=m; MI=id||null; ge("MT").textContent=t; ge("MB").innerHTML=h; ge("OV").className="ov on"; }
function cMd() { ge("OV").className="ov"; }
function setFS(i)  { FS=i; ren(); }
function setSTS(i) { STS=i; rSets(); }
function setFT(i)  { FT=i; buildFeeXtra(); ge("MB").querySelectorAll(".ftb").forEach(function(b,j){b.className="ftb"+(j===i?" on":"");}); }
function buildFeeXtra() {
  var x=ge("fxtra"); if(!x)return;
  if(FT===0) x.innerHTML="<div><label class=\"lbl\">Monthly Fee ($)</label><input class=\"inp\" type=\"number\" id=\"fmf\" placeholder=\"500\"></div>";
  else if(FT===1) x.innerHTML="<div><label class=\"lbl\">Profit Percentage (%)</label><input class=\"inp\" type=\"number\" id=\"fpp\" placeholder=\"30\"></div>";
  else x.innerHTML="<div><label class=\"lbl\">Total Project Value ($)</label><input class=\"inp\" type=\"number\" id=\"fpt\" placeholder=\"3000\"></div><div class=\"g2\"><div><label class=\"lbl\">Upfront ($)</label><input class=\"inp\" type=\"number\" id=\"fpu\" placeholder=\"1500\"></div><div><label class=\"lbl\">Due Later ($)</label><input class=\"inp\" type=\"number\" id=\"fpd\" placeholder=\"1500\"></div></div>";
}
function togEl(el) { var n=el.nextElementSibling; n.style.display=n.style.display==="none"?"block":"none"; }

// ═══════════════════════ DASHBOARD ═══════════════════
function rDash() {
  var lA=AA.filter(function(a){return a.s==="Live & Selling";}),lR=lA.reduce(function(s,a){return s+fval(a);},0);
  var tS=TM.reduce(function(s,v){return s+sval(v);},0),tC=CS.reduce(function(s,c){return s+(+c.amt||0);},0),net=lR-tS-tC;
  var allInv=[];AA.forEach(function(a){(a.iv||[]).forEach(function(i){allInv.push(Object.assign({},i,{cl:a.cl,cid:a.id}));});});
  var overdue=allInv.filter(function(i){return i.st==="Overdue";}),unpaid=allInv.filter(function(i){return i.st==="Unpaid";});
  var tOv=overdue.reduce(function(s,i){return s+i.amt;},0),tUp=unpaid.reduce(function(s,i){return s+i.amt;},0);
  var fuDue=AA.filter(function(a){return a.fu&&a.fu<=tday();});

// ═══════════════════════ SIDE PANEL ══════════════════
function openSide(id){SID=id;STAB=0;ge("SIDE").classList.add("on");document.querySelectorAll(".stab").forEach(function(el,i){el.className="stab"+(i===0?" on":"");});rSide();}
function closeSide(){SID=null;ge("SIDE").classList.remove("on");}
function setStab(n){STAB=n;document.querySelectorAll(".stab").forEach(function(el,i){el.className="stab"+(i===n?" on":"");});rSide();}
function rSide(){
  var a=AA.find(function(x){return x.id===SID;});if(!a){closeSide();return;}
  ge("S-nm").textContent=a.cl||"—";ge("S-co").textContent=a.co||"";
  var b=ge("S-bd"),vd=TM.find(function(v){return v.name===a.va;});

x;font-size:12px;color:var(--mu);line-height:1.7;margin-top:10px\"><div style=\"color:#4f6ef7;font-size:9px;font-weight:700;margin-bottom:3px\">NOTES</div>"+esc(a.no)+"</div>":"");
  } else if(STAB===1){
    var invs=(a.iv||[]).slice().sort(function(x,y){return(y.mo||"").localeCompare(x.mo||"");});
    var tP=invs.filter(function(i){return i.st==="Paid";}).reduce(function(s,i){return s+i.amt;},0),tU=invs.filter(function(i){return i.st==="Unpaid";}).reduce(function(s,i){return s+i.amt;},0),tO=invs.filter(function(i){return i.st==="Overdue";}).reduce(function(s,i){return s+i.amt;},0);
    b.innerHTML=(invs.length?"<div class=\"g3\" style=\"margin-bottom:12px\"><div style=\"background:rgba(34,197,94,.08);border-radius:8px;padding:9px;text-align:center\"><div style=\"font-weight:700;color:#22c55e;font-size:14px\">"+dol(tP)+"</div><div style=\"font-size:9px;color:#86efac\">Paid</div></div><div style=\"background:rgba(245,158,11,.08);border-radius:8px;padding:9px;text-align:center\"><div style=\"font-weight:700;color:#f59e0b;font-size:14px\">"+dol(tU)+"</div><div style=\"font-size:9px;color:#fcd34d\">Unpaid</div></div><div style=\"background:rgba(239,68,68,.08);border-radius:8px;padding:9px;text-align:center\"><div style=\"font-weight:700;color:#ef4444;font-size:14px\">"+dol(tO)+"</div><div style=\"font-size:9px;color:#fca5a5\">Overdue</div></div></div>":"")+"<div class=\"csm\" style=\"margin-bottom:10px\"><div class=\"g2\" style=\"margin-bottom:8px\"><div><label class=\"lbl\">Month</label><input class=\"inp\" type=\"month\" id=\"ivm\" value=\""+cmon()+"\"></div><div><label class=\"lbl\">Amount ($)</label><input class=\"inp\" type=\"number\" id=\"iva\" placeholder=\"500\"></div></div><select class=\"sel\" id=\"ivs\" style=\"margin-bottom:8px\"><option>Unpaid</option><option>Paid</option><option>Overdue</option></select><button class=\"bp\" style=\"width:100%;padding:8px\" onclick=\"addInv()\">Add Invoice</button></div>"+invs.map(function(i){var ic=i.st==="Paid"?"#22c55e":i.st==="Overdue"?"#ef4444":"#f59e0b";return"<div class=\"csm\" style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px\"><div style=\"flex:1\"><div style=\"font-weight:700;font-size:14px;color:#fff\">"+dol(i.amt)+"</div><div style=\"font-size:9px;color:var(--mu)\">"+mlab(i.mo)+"</div></div><button onclick=\"cycleInv("+i.id+")\" style=\"background:rgba(255,255,255,.06);color:"+ic+";border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 9px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit\">"+i.st+"</button><button class=\"bd\" style=\"padding:2px 7px;font-size:11px\" onclick=\"delInv("+i.id+")\">&#10005;</button></div>";}).join("")+(!invs.length?"<div style=\"text-align:center;padding:28px;color:var(--mu);font-size:12px\">No invoices yet</div>":"");
  } else if(STAB===2){
    var vaO2="<option>-</option>";TM.forEach(function(v){vaO2+="<option>"+esc(v.name)+"</option>";});
    var tkRows="";
    (a.tk||[]).forEach(function(t){var vd2=TM.find(function(v){return v.name===t.who;});var ov=t.due&&t.due<tday()&&!t.done;var chkd=t.done?" checked":"";var styl=t.done?"text-decoration:line-through;color:var(--mu)":"";var dc=ov?"#f59e0b":"#86efac";var vsp=vd2?"<span class=\"ch\" style=\"background:"+vd2.bg+";color:"+vd2.tx+"\">"+esc(t.who)+"</span>":"";var dsp=t.due?"<span style=\"font-size:9px;color:"+dc+"\">"+esc(t.due)+"</span>":"";tkRows+="<div class=\"csm\" style=\"margin-bottom:7px;opacity:"+(t.done?.5:1)+"\"><div style=\"display:flex;align-items:center;gap:9px\"><input type=\"checkbox\""+chkd+" onchange=\"togTask("+t.id+",this.checked)\" style=\"cursor:pointer;width:15px;height:15px;flex-shrink:0\"><div style=\"flex:1\"><div style=\"font-size:13px;font-weight:500;"+styl+"\">"+esc(t.title)+"</div><div style=\"display:flex;gap:5px;margin-top:3px\">"+vsp+dsp+"</div></div><button class=\"bd\" style=\"padding:2px 7px;font-size:11px\" onclick=\"delTask("+t.id+")\">&#10005;</button></div></div>";});
    b.innerHTML="<div class=\"csm\" style=\"margin-bottom:10px\"><div class=\"fg\"><div><label class=\"lbl\">Task</label><input class=\"inp\" id=\"tkt\" placeholder=\"Task description...\"></div><div class=\"g2\"><div><label class=\"lbl\">Assign To</label><select class=\"sel\" id=\"tkw\">"+vaO2+"</select></div><div><label class=\"lbl\">Due Date</label><input class=\"inp\" type=\"date\" id=\"tkd\"></div></div><button class=\"bp\" style=\"width:100%;padding:8px\" onclick=\"addTask()\">Add Task</button></div></div>"+tkRows+(!( a.tk||[]).length?"<div style=\"text-align:center;padding:28px;color:var(--mu);font-size:12px\">No tasks yet</div>":"");
  } else {
    var acts=a.ac||[];
    b.innerHTML="<div style=\"display:flex;gap:7px;margin-bottom:10px\"><input class=\"inp\" id=\"nt\" placeholder=\"Add a note...\" onkeydown=\"if(event.key==='Enter')addNote()\" style=\"flex:1\"><button class=\"bp\" style=\"padding:8px 12px\" onclick=\"addNote()\">Add</button></div>"+acts.map(function(e){return"<div class=\"csm\" style=\"margin-bottom:7px;border-left:3px solid #4f6ef7\"><div style=\"font-size:13px;color:#fff\">"+esc(e.text)+"</div><div style=\"font-size:9px;color:var(--mu);margin-top:3px\">"+esc(e.time)+"</div></div>";}).join("")+(!acts.length?"<div style=\"text-align:center;padding:28px;color:var(--mu);font-size:12px\">No notes yet</div>":"");
  }
}
async function addNote(){var t=gv("nt");if(!t.trim()||SID==null)return;var a=AA.find(function(x){return x.id===SID;});if(!a)return;a.ac=a.ac||[];a.ac.unshift({text:t.trim(),time:new Date().toLocaleString("en-GB")});a.lc=tday();await sav();rSide();toast("Note added");}
async function addTask(){var t=gv("tkt");if(!t.trim()||SID==null)return;var a=AA.find(function(x){return x.id===SID;});if(!a)return;a.tk=a.tk||[];a.tk.push({id:Date.now(),title:t.trim(),who:gv("tkw")||"-",due:gv("tkd"),done:false});await sav();rSide();toast("Task added");}
async function togTask(tid,done){var a=AA.find(function(x){return x.id===SID;});if(!a)return;a.tk=(a.tk||[]).map(function(t){return t.id===tid?Object.assign({},t,{done:done}):t;});await sav();rSide();}
async function delTask(tid){var a=AA.find(function(x){return x.id===SID;});if(!a)return;a.tk=(a.tk||[]).filter(function(t){return t.id!==tid;});await sav();rSide();toast("Deleted");}
async function addInv(){var amt=gv("iva");if(!amt||SID==null)return;var a=AA.find(function(x){return x.id===SID;});if(!a)return;a.iv=a.iv||[];a.iv.push({id:Date.now(),mo:gv("ivm")||cmon(),amt:+amt,st:gv("ivs")||"Unpaid"});await sav();rSide();ren();toast("Invoice added");}
async function cycleInv(iid){var cy={"Unpaid":"Paid","Paid":"Overdue","Overdue":"Unpaid"};var a=AA.find(function(x){return x.id===SID;});if(!a)return;a.iv=(a.iv||[]).map(function(i){return i.id===iid?Object.assign({},i,{st:cy[i.st]||"Unpaid"}):i;});await sav();rSide();}
async function delInv(iid){var a=AA.find(function(x){return x.id===SID;});if(!a)return;a.iv=(a.iv||[]).filter(function(i){return i.id!==iid;});await sav();rSide();toast("Deleted");}

// ═══════════════════════ ACCOUNT MODAL ═══════════════
function mkAccFm(a){
  a=a||blank();
  var plO="";PLATS.forEach(function(p){plO+="<option"+(a.pl===p?" selected":"")+">"+ esc(p)+"</option>";});
  var stO="";STATS.forEach(function(s){stO+="<option"+(a.s===s?" selected":"")+">"+ esc(s)+"</option>";});
  var vaO="<option value=\"-\">-</option>";TM.forEach(function(v){vaO+="<option"+(a.va===v.name?" selected":"")+">"+ esc(v.name)+"</option>";});
  var ftB=["Monthly","Profit %","Project"].map(function(ft,i){return"<button type=\"button\" class=\"ftb"+(FT===i?" on":"")+"\" onclick=\"setFT("+i+")\">"+ft+"</button>";}).join("");
  return"<div class=\"g2\"><div><label class=\"lbl\">Client Name *</label><input class=\"inp\" id=\"fc\" value=\""+esc(a.cl)+"\"></div><div><label class=\"lbl\">Company</label><input class=\"inp\" id=\"fco\" value=\""+esc(a.co||"")+"\"></div></div><div class=\"g2\"><div><label class=\"lbl\">Phone</label><input class=\"inp\" id=\"fph\" value=\""+esc(a.ph||"")+"\"></div><div><label class=\"lbl\">WhatsApp (with country code)</label><input class=\"inp\" id=\"fwa\" placeholder=\"+447700000000\" value=\""+esc(a.wa||"")+"\"></div></div><div class=\"g2\"><div><label class=\"lbl\">Email</label><input class=\"inp\" id=\"fem\" value=\""+esc(a.em||"")+"\"></div><div><label class=\"lbl\">Country</label><input class=\"inp\" id=\"fcy\" value=\""+esc(a.cy||"")+"\"></div></div><div class=\"g2\"><div><label class=\"lbl\">Platform</label><select class=\"sel\" id=\"fpl\">"+plO+"</select></div><div><label class=\"lbl\">Status</label><select class=\"sel\" id=\"fst\">"+stO+"</select></div></div><div><label class=\"lbl\">Assigned VA</label><select class=\"sel\" id=\"fva\">"+vaO+"</select></div><div><label class=\"lbl\">Fee Type</label><div class=\"g3\">"+ftB+"</div></div><div id=\"fxtra\"></div><div class=\"g2\"><div><label class=\"lbl\">Contract Start</label><input class=\"inp\" type=\"date\" id=\"fcs\" value=\""+esc(a.cs||"")+"\"></div><div><label class=\"lbl\">Contract End</label><input class=\"inp\" type=\"date\" id=\"fce\" value=\""+esc(a.ce||"")+"\"></div></div><div class=\"g2\"><div><label class=\"lbl\">Last Contacted</label><input class=\"inp\" type=\"date\" id=\"flc\" value=\""+esc(a.lc||"")+"\"></div><div><label class=\"lbl\">Follow Up Date</label><input class=\"inp\" type=\"date\" id=\"ffu\" value=\""+esc(a.fu||"")+"\"></div></div><div><label class=\"lbl\">Notes</label><textarea class=\"inp\" id=\"fno\" rows=\"3\">"+esc(a.no||"")+"</textarea></div><button class=\"bp\" style=\"width:100%;padding:11px\" onclick=\"savAcc()\">"+(a.id?"Save Changes":"Add Account")+"</button>";
}
function oAdd(){FT=0;oMd("New Account",mkAccFm(null),"add",null);buildFeeXtra();}
function oEdit(id){var a=AA.find(function(x){return x.id===id;});if(!a)return;FT=a.ft==="Profit %"?1:a.ft==="Project"?2:0;oMd("Edit Account",mkAccFm(a),"edit",id);setTimeout(function(){buildFeeXtra();if(ge("fmf"))ge("fmf").value=a.mf||"";if(ge("fpp"))ge("fpp").value=a.pp||"";if(ge("fpt"))ge("fpt").value=a.pt||"";if(ge("fpu"))ge("fpu").value=a.pu||"";if(ge("fpd"))ge("fpd").value=a.pd||"";},30);}
async function savAcc(){
  var cl=(gv("fc")||"").trim();if(!cl){toast("Client name required",true);return;}
  var acc={cl:cl,co:gv("fco"),ph:gv("fph"),wa:gv("fwa"),em:gv("fem"),cy:gv("fcy"),pl:gv("fpl")||"eBay UK",s:gv("fst")||"Lead",va:gv("fva")||"-",ft:FTS[FT]||"Monthly",mf:Number(gv("fmf"))||0,pp:Number(gv("fpp"))||0,pt:Number(gv("fpt"))||0,pu:Number(gv("fpu"))||0,pd:Number(gv("fpd"))||0,cs:gv("fcs"),ce:gv("fce"),lc:gv("flc"),fu:gv("ffu"),no:gv("fno")};
  if(MM==="edit"&&MI){AA=AA.map(function(a){return a.id===MI?Object.assign({},a,acc):a;});toast("Saved");}
  else{acc.id=mxid(AA)+1;acc.ac=[];acc.tk=[];acc.iv=[];AA.push(acc);toast("Account added");}
  await sav();cMd();ren();if(SID===MI)rSide();
}
